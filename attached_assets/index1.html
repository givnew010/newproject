<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خطة إكمال مشروع المُنسق — مفصّلة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080d1a;
    --bg2: #0c1220;
    --surface: #111827;
    --surface2: #161f33;
    --surface3: #1c2840;
    --border: #1e2d4a;
    --border2: #243556;
    --text: #e2eaf8;
    --muted: #5d7099;
    --muted2: #8098c4;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ═══ TOP HEADER ═══ */
  .top-header {
    background: linear-gradient(180deg, #0f1829 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 24px 32px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .top-header h1 {
    font-size: clamp(20px, 4vw, 34px);
    font-weight: 900;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .top-header p { color: var(--muted2); font-size: 13px; margin-top: 6px; }

  /* progress */
  .progress-bar-wrap {
    max-width: 600px;
    margin: 16px auto 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .prog-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #3b82f6, #0ea5e9);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .prog-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
    min-width: 56px;
    text-align: left;
  }

  /* ═══ LAYOUT ═══ */
  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ═══ SIDEBAR NAV ═══ */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    padding: 24px 0;
    position: sticky;
    top: 120px;
    height: calc(100vh - 120px);
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0 12px;
    margin-bottom: 10px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted2);
    transition: all 0.15s;
    margin-bottom: 2px;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface3); color: var(--text); }
  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .nav-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: var(--border);
    padding: 1px 6px;
    border-radius: 99px;
    margin-right: auto;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ═══ MAIN CONTENT ═══ */
  .main-content {
    flex: 1;
    min-width: 0;
    padding: 24px 0 24px 24px;
  }

  /* ═══ PHASE ═══ */
  .phase-section {
    margin-bottom: 40px;
    scroll-margin-top: 140px;
  }
  .phase-heading {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .phase-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .phase-title-block { flex: 1; }
  .phase-title-block h2 { font-size: 17px; font-weight: 800; }
  .phase-title-block p { font-size: 12px; color: var(--muted2); margin-top: 3px; }
  .phase-stats {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .phase-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--muted2);
  }

  /* ═══ GROUP (sub-group within phase) ═══ */
  .task-group {
    margin-bottom: 20px;
  }
  .group-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-right: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ═══ TASK CARD ═══ */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    margin-bottom: 8px;
    transition: border-color 0.2s, background 0.2s;
    overflow: hidden;
  }
  .task-card:hover { border-color: var(--border2); }
  .task-card.done { opacity: 0.45; }
  .task-card.done .task-title { text-decoration: line-through; }

  .task-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
  }
  .task-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s;
  }
  .task-card.done .task-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-svg { display: none; }
  .task-card.done .check-svg { display: block; }

  .task-main { flex: 1; min-width: 0; }
  .task-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .task-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 400;
  }
  .task-brief { font-size: 12px; color: var(--muted2); line-height: 1.6; }

  .task-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .priority-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .p-urgent  { background: #ef444418; color: #f87171; border: 1px solid #ef444435; }
  .p-important { background: #f59e0b18; color: #fbbf24; border: 1px solid #f59e0b35; }
  .p-enhance { background: #10b98118; color: #34d399; border: 1px solid #10b98135; }
  .effort-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 5px;
    white-space: nowrap;
  }

  /* expandable detail */
  .task-expand-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px 12px 48px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  .task-expand-btn:hover { color: var(--muted2); }
  .expand-arrow { font-size: 9px; transition: transform 0.2s; }
  .expand-arrow.open { transform: rotate(180deg); }

  .task-detail {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 16px 16px 16px 48px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s cubic-bezier(.4,0,.2,1);
  }
  .task-detail.open { max-height: 800px; }

  .detail-section { margin-bottom: 14px; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .detail-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .detail-list li {
    font-size: 12px;
    color: var(--muted2);
    padding-right: 14px;
    position: relative;
    line-height: 1.6;
  }
  .detail-list li::before {
    content: '◦';
    position: absolute;
    right: 0;
    color: var(--muted);
  }
  .code-inline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    padding: 1px 6px;
    border-radius: 4px;
    color: #93c5fd;
  }
  .file-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: #1e3a5f;
    border: 1px solid #2d5a8f;
    color: #7dd3fc;
    padding: 2px 7px;
    border-radius: 4px;
    margin: 2px;
  }
  .files-row { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }

  /* ═══ STATS OVERVIEW ═══ */
  .overview-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    max-width: 1200px;
    margin: 24px auto 0;
    padding: 0 16px;
  }
  .ov-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .ov-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .ov-label { font-size: 11px; color: var(--muted2); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .main-content { padding: 16px 0; }
    .layout { padding: 0 12px; }
  }
</style>
</head>
<body>

<!-- TOP HEADER -->
<div class="top-header">
  <h1>خطة إكمال مشروع المُنسق — مفصّلة</h1>
  <p>Backend API (SQLite + Express) · ربط Frontend · ميزات جديدة كاملة</p>
  <div class="progress-bar-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-label" id="progLabel">0 / 0</div>
  </div>
</div>

<!-- OVERVIEW CARDS -->
<div class="overview-cards">
  <div class="ov-card"><div class="ov-num" style="color:#60a5fa" id="ovTotal">0</div><div class="ov-label">إجمالي المهام</div></div>
  <div class="ov-card"><div class="ov-num" style="color:#34d399" id="ovDone">0</div><div class="ov-label">منجزة</div></div>
  <div class="ov-card"><div class="ov-num" style="color:#f87171" id="ovUrgent">0</div><div class="ov-label">عاجلة</div></div>
  <div class="ov-card"><div class="ov-num" style="color:#fbbf24" id="ovImportant">0</div><div class="ov-label">مهمة</div></div>
  <div class="ov-card"><div class="ov-num" style="color:#a78bfa" id="ovPhases">0</div><div class="ov-label">مراحل</div></div>
</div>

<!-- LAYOUT -->
<div class="layout" style="margin-top:24px">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar"></nav>
  <!-- MAIN -->
  <div class="main-content" id="mainContent"></div>
</div>

<script>
const STORAGE_KEY = 'almunsiq_v2_done';
const EXPAND_KEY  = 'almunsiq_v2_expand';

// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
const phases = [
{

          steps:[

},

    {

const STORE_DONE   = 'almunsiq_v3_done';
const STORE_EXPAND = 'almunsiq_v3_expand';
const DEFAULT_DONE = [
'1-1', '1-2', '1-3', '1-4', 
'2-1', '2-2', '2-3', '2-4', '2-5', '2-6', '2-7', '2-8', '2-9', '2-10', 
'3-1', '3-2', '3-3', '3-4',
'4-1', '4-2', '4-3', '4-4', '4-5',
'5-1', '5-2', '5-3',
'6-1', '6-2', '6-3', '6-4',
'7-1', '7-2', '7-3',
'8-1', '8-2', '8-3', '8-4', '8-5', '8-6',
'9-1', '9-2', '9-3', '9-4',
'10-1', '10-2', '10-3',
'11-1', '11-2', '11-3', '11-4',
'12-1', '12-2', '12-3', '12-4',
// '13-1', '13-2', '13-3', '13-4',
];

let doneSet   = new Set(JSON.parse(/* localStorage.getItem(STORE_DONE)   || */ JSON.stringify(DEFAULT_DONE)));
let expandSet = new Set(JSON.parse(localStorage.getItem(STORE_EXPAND) || '[]'));

function saveDone()   { localStorage.setItem(STORE_DONE,   JSON.stringify([...doneSet])); }
function saveExpand() { localStorage.setItem(STORE_EXPAND, JSON.stringify([...expandSet])); }

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function allTasks() {
  return phases.flatMap(p => p.groups.flatMap(g => g.tasks));
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `<div class="sidebar-label">المراحل</div>`;
  phases.forEach(p => {
    const tasks   = p.groups.flatMap(g => g.tasks);
    const done    = tasks.filter(t => doneSet.has(t.id)).length;
    const a = document.createElement('a');
    a.className = 'nav-item';
    a.href = '#' + p.id;
    a.innerHTML = `
      <div class="nav-dot" style="background:${p.color}"></div>
      <span style="flex:1;line-height:1.3">${p.title.replace(/المرحلة \d+ — /,'')}</span>
      <span class="nav-count">${done}/${tasks.length}</span>
    `;
    sidebar.appendChild(a);
  });
}

function renderMain() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  phases.forEach(p => {
    const allPhaseTasks = p.groups.flatMap(g => g.tasks);
    const donePhaseTasks = allPhaseTasks.filter(t => doneSet.has(t.id)).length;

    const section = document.createElement('div');
    section.className = 'phase-section';
    section.id = p.id;

    section.innerHTML = `
      <div class="phase-heading">
        <div class="phase-badge" style="background:${p.color}22;border:1px solid ${p.color}44;color:${p.color}">
          ${p.id.replace('ph','')}
        </div>
        <div class="phase-title-block">
          <h2 style="color:${p.color}">${p.title}</h2>
          <p>${p.sub}</p>
        </div>
        <div class="phase-stats">
          <div class="phase-stat">${donePhaseTasks}/${allPhaseTasks.length} مهمة</div>
        </div>
      </div>
    `;

    p.groups.forEach(g => {
      const groupDiv = document.createElement('div');
      groupDiv.className = 'task-group';
      groupDiv.innerHTML = `<div class="group-label" style="color:${p.color}99">${g.label}</div>`;

      g.tasks.forEach(task => {
        const isDone   = doneSet.has(task.id);
        const isExpand = expandSet.has(task.id);

        const pClass = task.priority === 'urgent' ? 'p-urgent' : task.priority === 'important' ? 'p-important' : 'p-enhance';
        const pLabel = task.priority === 'urgent' ? '🔴 عاجل' : task.priority === 'important' ? '🟡 مهم' : '🟢 تحسين';

        const card = document.createElement('div');
        card.className = `task-card ${isDone ? 'done' : ''}`;
        card.id = 'card-' + task.id;

        const filesHTML = task.files ? `
          <div class="detail-section">
            <div class="detail-section-title">الملفات المتأثرة</div>
            <div class="files-row">
              ${task.files.map(f => `<span class="file-chip">📄 ${f}</span>`).join('')}
            </div>
          </div>` : '';

        const notesHTML = task.notes ? `
          <div class="detail-section">
            <div class="detail-section-title">ملاحظة</div>
            <p style="font-size:12px;color:#fbbf24;line-height:1.6">⚠️ ${task.notes}</p>
          </div>` : '';

        card.innerHTML = `
          <div class="task-top" onclick="toggleDone('${task.id}')">
            <div class="task-check">
              <svg class="check-svg" width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="task-main">
              <div class="task-title">
                ${task.title}
                <span class="task-id">${task.id}</span>
              </div>
              <div class="task-brief">${task.brief}</div>
            </div>
            <div class="task-right">
              <div class="priority-badge ${pClass}">${pLabel}</div>
              <div class="effort-badge">⏱ ${task.effort}</div>
            </div>
          </div>
          <div class="task-expand-btn" onclick="toggleExpand('${task.id}')">
            <span class="expand-arrow ${isExpand ? 'open' : ''}">▾</span>
            <span>${isExpand ? 'إخفاء التفاصيل' : 'عرض الخطوات التفصيلية'} (${task.steps.length} خطوات)</span>
          </div>
          <div class="task-detail ${isExpand ? 'open' : ''}" id="detail-${task.id}">
            <div class="detail-section">
              <div class="detail-section-title">الخطوات التفصيلية</div>
              <ul class="detail-list">
                ${task.steps.map(s => `<li>${s}</li>`).join('')}
              </ul>
            </div>
            ${filesHTML}
            ${notesHTML}
          </div>
        `;

        groupDiv.appendChild(card);
      });

      section.appendChild(groupDiv);
    });

    main.appendChild(section);
  });
}

function updateStats() {
  const tasks   = allTasks();
  const total   = tasks.length;
  const done    = tasks.filter(t => doneSet.has(t.id)).length;
  const urgent  = tasks.filter(t => t.priority === 'urgent' && !doneSet.has(t.id)).length;
  const imp     = tasks.filter(t => t.priority === 'important' && !doneSet.has(t.id)).length;

  document.getElementById('progFill').style.width  = total ? `${(done/total)*100}%` : '0%';
  document.getElementById('progLabel').textContent  = `${done} / ${total}`;
  document.getElementById('ovTotal').textContent    = total;
  document.getElementById('ovDone').textContent     = done;
  document.getElementById('ovUrgent').textContent   = urgent;
  document.getElementById('ovImportant').textContent= imp;
  document.getElementById('ovPhases').textContent   = phases.length;
}

function toggleDone(taskId) {
  if (doneSet.has(taskId)) doneSet.delete(taskId);
  else doneSet.add(taskId);
  saveDone();

  const card = document.getElementById('card-' + taskId);
  if (card) {
    card.classList.toggle('done', doneSet.has(taskId));
  }
  updateStats();
  renderSidebar(); // update counts
}

function toggleExpand(taskId) {
  if (expandSet.has(taskId)) expandSet.delete(taskId);
  else expandSet.add(taskId);
  saveExpand();

  const detail = document.getElementById('detail-' + taskId);
  const btn    = detail?.previousElementSibling;
  const arrow  = btn?.querySelector('.expand-arrow');
  const label  = btn?.querySelector('span:last-child');
  const task   = allTasks().find(t => t.id === taskId);

  if (detail) detail.classList.toggle('open', expandSet.has(taskId));
  if (arrow)  arrow.classList.toggle('open', expandSet.has(taskId));
  if (label && task)  label.textContent = expandSet.has(taskId)
    ? `إخفاء التفاصيل (${task.steps.length} خطوات)`
    : `عرض الخطوات التفصيلية (${task.steps.length} خطوات)`;
}

// expose globally
window.toggleDone   = toggleDone;
window.toggleExpand = toggleExpand;

// INIT
renderSidebar();
renderMain();
updateStats();
</script>
</body>
</html>
